openapi: 3.0.0
info:
  title: eServices Gateway API (bundle)
  version: 1.0.0
  description: Aggregated API for all microservices
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT

servers:
  - url: http://localhost:8000

paths:
  $ref: './services/identity/index.yaml#/paths'

components:
  schemas:
    $ref: './services/identity/index.yaml#/components/schemas'
  responses:
    $ref: './services/identity/index.yaml#/components/responses'

securitySchemes:
  BearerAuth:
    type: http
    scheme: bearer
    bearerFormat: JWT

security:
  - BearerAuth: []
